name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read   # checkout
  packages: write  # push image to ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements-dev.txt

    - name: Run tests
      env:                               # a search provider so any pipeline build in tests passes
        SEARXNG_URL: http://searxng:8080
      run: pytest --tb=short -q

  build:
    runs-on: ubuntu-latest
    needs: test                          # no green tests → no image is built
    # Publish the image only on main / manual dispatch, never on PRs: PR builds
    # would clobber :latest with the PR branch's code. PRs still run tests above.
    if: github.event_name != 'pull_request'
    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/${{ github.repository }}:latest --tag ghcr.io/${{ github.repository }}:${{ github.sha }}

    - name: Push Docker images
      run: |
        docker push ghcr.io/${{ github.repository }}:latest
        docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
